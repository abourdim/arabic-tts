# MSA Arabic TTS — docker-compose.yml
version: '3.9'

services:
  tts-api:
    image: msa-tts:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msa_tts_api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - TTS_DEVICE=${TTS_DEVICE:-auto}
      - TTS_DIACRITIZER=${TTS_DIACRITIZER:-auto}
      - TTS_MODEL_PATH=${TTS_MODEL_PATH:-}
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  tts-frontend:
    image: nginx:alpine
    container_name: msa_tts_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./msa_tts_frontend.html:/usr/share/nginx/html/index.html:ro
      - ./docs/msa_tts_docs.html:/usr/share/nginx/html/docs.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      tts-api:
        condition: service_healthy
    restart: unless-stopped
